<!DOCTYPE html>
<html lang="en">
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />

    />
    <link

    />

    <link

    <link

    <meta charset="utf-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Portfolio</title>
    <script>
      // Restore path encoded by 404.html redirect
      (function () {
        var search = window.location.search;
        if (search.indexOf('?p=') === 0 || search.indexOf('&p=') !== -1) {
          var params = search.slice(1).split('&').reduce(function (acc, s) {
            var kv = s.split('=');
            acc[kv[0]] = kv.slice(1).join('=').replace(/~and~/g, '&');
            return acc;
          }, {});
          var path = (params.p || '').replace(/~and~/g, '&');
          var query = params.q ? '?' + params.q.replace(/~and~/g, '&') : '';
          window.history.replaceState(
            null, null,
            window.location.pathname.replace(/\/$/, '') +
              (path ? '/' + path : '/') + query + window.location.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/index.jsx"></script>
  </body>
</html>
